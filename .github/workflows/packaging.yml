# GitHub actions
# See documentation: https://docs.github.com/en/actions
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
# CMake example: https://github.com/Mizux/cmake-cpp/blob/main/.github/workflows/amd64_windows.yml


name: Packaging

on: ['push', 'pull_request']


env:
  PYTHON_VERSION: '3.14'


jobs:

  firmware_update:
    name: Embed JS320 firmware
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Embed firmware
        run: python tools/embed_js320_firmware.py

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v5
        with:
          name: joulescope_driver
          path: |
            include_private/jsdrv_prv/devices/js320/firmware.h
            src/devices/js320/firmware.c
          if-no-files-found: error

  build_native_win:
    name: Build native on ${{ matrix.os }} (shared=${{ matrix.shared }})
    needs:
      - firmware_update
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: windows-latest, shared: OFF, target: ALL_BUILD,
             jci_platform: windows-x86_64}
          - {os: windows-latest, shared: ON, target: jsdrv}
          - {os: windows-11-arm, shared: OFF, target: ALL_BUILD,
             jci_platform: windows-arm64}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Download JS320 firmware
        uses: actions/download-artifact@v6
        with:
          name: joulescope_driver
          path: .

      - name: Build
        run: |
          cmake --version
          # No -G: the default picks the newest installed Visual Studio,
          # which differs between windows-latest and windows-11-arm images.
          cmake -S . -B cmake_build -DCMAKE_CONFIGURATION_TYPES=Release -DCMAKE_VERBOSE_MAKEFILE=ON -DBUILD_SHARED_LIBS=${{matrix.shared}}
          cmake --build cmake_build --config Release --target ${{matrix.target}}

      - name: Run tests
        if: matrix.shared == 'OFF'
        run: cmake --build cmake_build --config Release --target RUN_TESTS

      - name: Create artifacts directory
        shell: bash
        run: mkdir artifacts

      - name: Save static
        if: matrix.shared == 'OFF'
        shell: bash
        run: cp cmake_build/example/Release/*.exe artifacts/

      - name: Save dynamic
        if: matrix.shared == 'ON'
        shell: pwsh
        run: Compress-Archive -Path cmake_build/src/Release/jsdrv.* -Destination artifacts/jsdrv_dll.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.os }}-${{ matrix.shared }}
          path: artifacts/*
          if-no-files-found: error

      # Stage under the {os}-{arch}/ platform dir at upload time so
      # push_bench_tools reassembles the full tree with one merged download.
      - name: Stage bench tools for joulescope_ci
        if: matrix.jci_platform
        shell: bash
        run: |
          mkdir -p jci/${{ matrix.jci_platform }}
          cp cmake_build/example/Release/minibitty.exe jci/${{ matrix.jci_platform }}/

      - name: Upload bench tools for joulescope_ci
        if: matrix.jci_platform
        uses: actions/upload-artifact@v5
        with:
          name: jci-${{ matrix.jci_platform }}
          path: jci
          if-no-files-found: error

  build_native_posix:
    name: Build native on ${{ matrix.os }}
    needs:
      - firmware_update
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "ubuntu-24.04-arm", "macos-latest"]
        include:
          # joulescope_ci bench platform (stations.yaml {os}-{arch} vocabulary)
          - {os: "ubuntu-latest", jci_platform: linux-x86_64}
          - {os: "ubuntu-24.04-arm", jci_platform: linux-arm64}
          - {os: "macos-latest", jci_platform: macos-arm64}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Download JS320 firmware
        uses: actions/download-artifact@v6
        with:
          name: joulescope_driver
          path: .

      - name: Install Ubuntu dependencies
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          sudo apt update
          sudo apt install -y libudev-dev

      - name: Display CMake version
        run: cmake --version

      - name: Build static
        run: |
          cmake -S . -B cmake_build_static -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_VERBOSE_MAKEFILE=ON -DCMAKE_VERBOSE_MAKEFILE=ON
          cmake --build cmake_build_static

      - name: Run tests
        run: cmake --build cmake_build_static --target test

      - name: Upload binaries
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.os }}
          path: cmake_build_static/example/jsdrv
          if-no-files-found: error

      # Stage under the {os}-{arch}/ platform dir at upload time so
      # push_bench_tools reassembles the full tree with one merged download.
      - name: Stage bench tools for joulescope_ci
        run: |
          mkdir -p jci/${{ matrix.jci_platform }}
          cp cmake_build_static/example/minibitty jci/${{ matrix.jci_platform }}/

      - name: Upload bench tools for joulescope_ci
        uses: actions/upload-artifact@v5
        with:
          name: jci-${{ matrix.jci_platform }}
          path: jci
          if-no-files-found: error

  build_python_sdist:
    name: Build python sdist
    needs:
      - firmware_update
    runs-on: ubuntu-latest
    steps:
      - name: Display info
        run: |
          echo "github.event_name=$GITHUB_EVENT_NAME"
          echo "github.ref=$GITHUB_REF"
          echo "github.ref_type=$GITHUB_REF_TYPE"
          echo "runner.os=$RUNNER_OS"
          echo "runner.arch=$RUNNER_ARCH"

      - name: Install Ubuntu dependencies
        run: |
          sudo apt update
          sudo apt install -y libudev-dev

      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Download JS320 firmware
        uses: actions/download-artifact@v6
        with:
          name: joulescope_driver
          path: .

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install python dependencies
        run: |
          python -VV
          python -m pip install --upgrade pip
          python -m pip install --upgrade wheel setuptools build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload python source package
        uses: actions/upload-artifact@v5
        with:
          name: python_sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  build_python_wheels:
    name: Build os=${{ matrix.os }}, python=${{ matrix.python_version }}
    needs:
      - build_python_sdist
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "ubuntu-24.04-arm", "windows-latest", "windows-11-arm", "macos-latest"]
        python_version: ["cp312", "cp313", "cp314"]

    steps:
      - name: Download sdist
        uses: actions/download-artifact@v6
        with:
          name: python_sdist
          path: dist/

      - name: Find sdist filename
        shell: bash
        id: find_sdist_filename
        run: echo "filename=$(ls dist/*.tar.gz)" >> $GITHUB_OUTPUT

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_ARCHS_MACOS: universal2
          CIBW_ARCHS_WINDOWS: native
          CIBW_ARCHS_LINUX: native
          # skip PyPy: Cython only supports CPython
          # skip musllinux: build takes too long with default os images.
          CIBW_SKIP: 'pp* *musllinux*'
          CIBW_BUILD: '${{ matrix.python_version }}-*'
          CIBW_BEFORE_BUILD_LINUX: for i in 1 2 3 4 5; do yum install -y --setopt=retries=10 --setopt=timeout=60 --setopt=fastestmirror=1 libudev-devel && test -f /usr/include/libudev.h && exit 0; sleep 5; done; exit 1
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: pytest --pyargs pyjoulescope_driver
          CIBW_TEST_SKIP: "*-macosx_universal2:arm64"  # cannot test arm64 on x86_64
        with:
          package-dir: ${{ steps.find_sdist_filename.outputs.filename }}

      - name: Upload python wheels
        uses: actions/upload-artifact@v5
        with:
          name: python_wheel-${{ matrix.os }}-${{ matrix.python_version }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  publish_python:
    name: Publish python packages to PyPi
    if: github.event_name == 'push' && startswith(github.ref, 'refs/tags/v')
    needs:
      - build_native_win
      - build_native_posix
      - build_python_wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Download python sdist artifacts
        uses: actions/download-artifact@v6
        with:
          name: python_sdist
          path: dist/

      - name: Download python wheel artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: python_wheel-*
          merge-multiple: true
          path: dist/

      - name: Download windows binary artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: windows-latest-*
          merge-multiple: true
          path: windows-latest

      - name: Display artifacts
        shell: bash
        run: ls dist/*

      - name: Publish packages to PyPi
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          print-hash: true

      - name: Publish Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            windows-latest/*

  push_bench_tools:
    name: Push bench tools to joulescope_ci
    if: github.event_name == 'push'
    needs:
      - build_native_win
      - build_native_posix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      # The jci-* artifacts already contain {os}-{arch}/ platform
      # directories (the coordinator's stations.yaml vocabulary), so one
      # merged download reassembles the complete tree.  The coordinator
      # extracts this tree and ships each platform's tools to the matching
      # benches (joulescope_ci doc/architecture.md section 9).
      - name: Download bench tools
        uses: actions/download-artifact@v6
        with:
          pattern: jci-*
          merge-multiple: true
          path: jci

      - name: Assemble joulescope_ci artifact zip
        run: |
          chmod +x jci/*/minibitty*
          ls -lR jci
          cd jci && zip -r ../jci_artifacts.zip *

      - name: Push to joulescope_ci coordinator
        env:
          JCI_BUILD_TOKEN: ${{ secrets.JCI_BUILD_TOKEN }}
        run: |
          python3 ci/ci_artifact_push.py \
            --url https://api.jetperch.com/github/build \
            --source github --repo joulescope_driver \
            --ref "$GITHUB_REF" --commit "$GITHUB_SHA" \
            --run-id "$GITHUB_RUN_ID" --build-kind dev \
            --artifact-type tool \
            --artifact jci_artifacts.zip

  build_node_js:
    name: build_node_js_${{ matrix.os }}
    needs:
      - firmware_update
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "ubuntu-24.04-arm", "windows-latest", "windows-11-arm", "macos-latest"]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Download JS320 firmware
        uses: actions/download-artifact@v6
        with:
          name: joulescope_driver
          path: .

      - name: Install Ubuntu dependencies
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          sudo apt update
          sudo apt install -y libudev-dev          

      - name: NPM
        shell: bash
        run: |
          cd node_api
          npm install --global prebuildify node-gyp node-gyp-build
          npm update
          prebuildify --napi --strip --target 20.12.2

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: node_js_native-${{ matrix.os }}
          path: node_api/prebuilds/*
          if-no-files-found: error

  package_node_js:
    name: Package node.js binding
    needs:
      - build_node_js
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Download node.js native build files
        uses: actions/download-artifact@v6
        with:
          pattern: node_js_native-*
          merge-multiple: true
          path: node_api/prebuilds/

      - name: Create package
        shell: bash
        run: |
          mkdir package
          cd node_api
          npm pack --pack-destination ../package

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: node_js
          path: package/*
          if-no-files-found: error

  publish_node_js:
    name: Publish node.js package to registry.npmjs.org
    if: github.event_name == 'push' && startswith(github.ref, 'refs/tags/v')
    needs:
      - package_node_js
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Download node package
        uses: actions/download-artifact@v6
        with:
          name: node_js
          path: dist/

      - name: Find package filename
        shell: bash
        id: find_package
        run: echo "filename=$(ls ./dist/*.tgz)" >> $GITHUB_OUTPUT

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install NPM command line utility
        run: npm install -g npm

      - name: Publish to NPM
        run: npm publish --provenance --access public ${{ steps.find_package.outputs.filename }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}